version: "3.9"

services:
  postgres:
    image: timescale/timescaledb-ha:pg16-latest
    container_name: smarthealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smarthealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smarthealth}
      POSTGRES_DB: ${POSTGRES_DB:-smarthealth}
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ../../data/schemas:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smarthealth} -d ${POSTGRES_DB:-smarthealth}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthealth

  redis:
    image: redis:7-alpine
    container_name: smarthealth-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-smarthealth}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-smarthealth}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthealth

  api:
    build:
      context: ../../backend/api
      dockerfile: Dockerfile
    container_name: smarthealth-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smarthealth}:${POSTGRES_PASSWORD:-smarthealth}@postgres:5432/${POSTGRES_DB:-smarthealth}
      REDIS_URL: redis://:${REDIS_PASSWORD:-smarthealth}@redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - smarthealth
    volumes:
      - ml_artefacts:/app/ml-models/artefacts

  celery-worker:
    build:
      context: ../../backend/api
      dockerfile: Dockerfile
    container_name: smarthealth-celery-worker
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q default,predictions,scoring,notifications
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smarthealth}:${POSTGRES_PASSWORD:-smarthealth}@postgres:5432/${POSTGRES_DB:-smarthealth}
      REDIS_URL: redis://:${REDIS_PASSWORD:-smarthealth}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smarthealth
    volumes:
      - ml_artefacts:/app/ml-models/artefacts

  celery-beat:
    build:
      context: ../../backend/api
      dockerfile: Dockerfile
    container_name: smarthealth-celery-beat
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smarthealth}:${POSTGRES_PASSWORD:-smarthealth}@postgres:5432/${POSTGRES_DB:-smarthealth}
      REDIS_URL: redis://:${REDIS_PASSWORD:-smarthealth}@redis:6379/0
    depends_on:
      - celery-worker
    networks:
      - smarthealth

  dashboard:
    build:
      context: ../../frontend/dashboard
      dockerfile: Dockerfile
    container_name: smarthealth-dashboard
    restart: unless-stopped
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:8000}
      VITE_WS_URL: ${WS_URL:-ws://localhost:8000}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - smarthealth

  field-app:
    build:
      context: ../../frontend/field-app
      dockerfile: Dockerfile
    container_name: smarthealth-field-app
    restart: unless-stopped
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:8000}
    ports:
      - "${FIELD_APP_PORT:-3001}:3001"
    depends_on:
      - api
    networks:
      - smarthealth

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: smarthealth-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - smarthealth

  grafana:
    image: grafana/grafana:10.3.3
    container_name: smarthealth-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-smarthealth}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    depends_on:
      - prometheus
    networks:
      - smarthealth

volumes:
  postgres_data:
  redis_data:
  ml_artefacts:
  prometheus_data:
  grafana_data:

networks:
  smarthealth:
    driver: bridge

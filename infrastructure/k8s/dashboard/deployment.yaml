apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: smarthealth
  labels:
    app: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: smarthealth/dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_URL
              value: "https://api.smarthealth.gov.in"
            - name: VITE_WS_URL
              value: "wss://api.smarthealth.gov.in"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: smarthealth
spec:
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smarthealth-ingress
  namespace: smarthealth
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: dashboard.smarthealth.gov.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 80
    - host: api.smarthealth.gov.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smarthealth-api
                port:
                  number: 80
    - host: field.smarthealth.gov.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: field-app
                port:
                  number: 80
  tls:
    - hosts:
        - dashboard.smarthealth.gov.in
        - api.smarthealth.gov.in
        - field.smarthealth.gov.in
      secretName: smarthealth-tls

apiVersion: apps/v1
kind: Deployment
metadata:
  name: smarthealth-api
  namespace: smarthealth
  labels:
    app: smarthealth-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: smarthealth-api
  template:
    metadata:
      labels:
        app: smarthealth-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: smarthealth/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: smarthealth-config
            - secretRef:
                name: smarthealth-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: ml-artefacts
              mountPath: /app/ml-models/artefacts
      volumes:
        - name: ml-artefacts
          persistentVolumeClaim:
            claimName: ml-artefacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: smarthealth-api
  namespace: smarthealth
spec:
  selector:
    app: smarthealth-api
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smarthealth-api-hpa
  namespace: smarthealth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smarthealth-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: smarthealth
  labels:
    app: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: smarthealth/api:latest
          command:
            - celery
            - -A
            - celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - default,predictions,scoring,notifications
          envFrom:
            - configMapRef:
                name: smarthealth-config
            - secretRef:
                name: smarthealth-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: ml-artefacts
              mountPath: /app/ml-models/artefacts
      volumes:
        - name: ml-artefacts
          persistentVolumeClaim:
            claimName: ml-artefacts-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: smarthealth
  labels:
    app: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: smarthealth/api:latest
          command:
            - celery
            - -A
            - celery_app
            - beat
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: smarthealth-config
            - secretRef:
                name: smarthealth-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
